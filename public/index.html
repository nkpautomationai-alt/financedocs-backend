async function copyTextWithFeedback(text, triggerBtn) {
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    // Clipboard API unavailable — fall back silently, button still shows "Copied" is skipped
  }
  const original = triggerBtn.textContent;
  triggerBtn.textContent = "Copied!";
  setTimeout(() => { triggerBtn.textContent = original; }, 1800);
}

function initLinkGenPanel() {
  const input = document.getElementById("linkClientSearchInput");
  const searchBtn = document.getElementById("linkClientSearchBtn");
  const resultsArea = document.getElementById("linkGenResultsArea");
  const outputRow = document.getElementById("linkOutputRow");
  const outputInput = document.getElementById("linkOutputInput");
  const copyBtn = document.getElementById("copyLinkBtn");
  const feedback = document.getElementById("copyFeedback");
  const shareBtnRow = document.getElementById("shareBtnRow");
  const emailShareBtn = document.getElementById("emailShareBtn");
  const whatsappShareBtn = document.getElementById("whatsappShareBtn");

  const buildShareMessage = (name, link, lineBreak) => {
    const nl = lineBreak || "\n";
    const greeting = name ? `Hi ${name},` : "Hi,";
    return `${greeting}${nl}${nl}Please use the link below to securely upload your documents:${nl}${link}${nl}${nl}Thanks!`;
  };

  const renderMatchesList = (results) => `
    <div class="panel" style="margin-top:14px;">
      <div class="panel-head"><span class="title">Multiple matches</span><span class="row-meta">${results.length} clients</span></div>
      <div class="panel-body">
        ${results.map(c => `
          <div class="doc-row" data-client-id="${escapeHTML(c.clientId || "")}" style="cursor:pointer;">
            <div class="client-avatar">${initials(c.name)}</div>
            <div style="flex:1; min-width:0;">
              <div class="client-name">${escapeHTML(c.name || "Unknown")}</div>
              <div class="client-email">${escapeHTML(c.email || "No email on file")} · ${escapeHTML(c.clientId || "—")}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  const wireMatchRows = () => {
    resultsArea.querySelectorAll("[data-client-id]").forEach(row => {
      row.addEventListener("click", () => selectClient(row.dataset.clientId));
    });
  };

  const selectClient = async (clientId) => {
    outputRow.style.display = "none";
    shareBtnRow.style.display = "none";
    feedback.textContent = "";
    resultsArea.innerHTML = `<div class="loading-spinner-row">Preparing link…</div>`;
    linkGenMatches = null;

    let name = "", email = "", phone = "", accessToken = "";

    try {
      const res = await authFetch(`${CLIENT_DETAIL_API}?id=${encodeURIComponent(clientId)}`);
      const data = await res.json();
      if (data && data.client) {
        // Coerce to strings defensively — if the Sheet stores phone as a
        // number, the API may return it as a JSON number, not a string.
        name = String(data.client.name || "");
        email = String(data.client.email || "");
        phone = String(data.client.phone || "");
        accessToken = String(data.client.accessToken || "");
      }
    } catch (err) {
      // If this lookup fails, we still show the link itself — just without pre-filled contact details.
    }

    const link = `${appSettings.clientPortalBaseUrl}?client=${encodeURIComponent(clientId)}${accessToken ? `&token=${encodeURIComponent(accessToken)}` : ""}`;

    resultsArea.innerHTML = "";
    outputInput.value = link;
    outputRow.style.display = "flex";
    shareBtnRow.style.display = "flex";

    // mailto: bodies need CRLF (\r\n) per RFC 6068 — plain \n is
    // silently dropped or mangled by some mail clients (notably Outlook).
    // The mailbox itself (before the ?) should NOT be percent-encoded —
    // only the query params (subject/body) should be.
    const emailMessage = buildShareMessage(name, link, "\r\n");
    const emailHref = `mailto:${email}?subject=${encodeURIComponent("Your document upload link")}&body=${encodeURIComponent(emailMessage)}`;
    console.log(email);
    console.log(emailHref);
    emailShareBtn.href = emailHref;

    const waMessage = buildShareMessage(name, link, "\n");
    const cleanPhone = phone.replace(/[^\d+]/g, "");
    const waHref = cleanPhone
      ? `https://wa.me/${encodeURIComponent(cleanPhone.replace(/^\+/, ""))}?text=${encodeURIComponent(waMessage)}`
      : `https://wa.me/?text=${encodeURIComponent(waMessage)}`;
    whatsappShareBtn.href = waHref;

    linkGenLink = link;
    linkGenEmailHref = emailHref;
    linkGenWhatsappHref = waHref;
    linkGenNoPhone = !phone;

    if (!phone) {
      feedback.textContent = "No phone number on file — WhatsApp will open without a pre-selected contact.";
      feedback.style.color = "var(--ink-3)";
    }
  };

  const search = async () => {
    const q = input.value.trim();
    if (!q) return;
    linkGenQuery = q;
    linkGenLink = "";
    outputRow.style.display = "none";
    shareBtnRow.style.display = "none";
    resultsArea.innerHTML = `<div class="loading-spinner-row">Searching…</div>`;

    try {
      const res = await authFetch(`${CLIENTS_SEARCH_API}?name=${encodeURIComponent(q)}`);
      const data = await res.json();
      const results = Array.isArray(data) ? data : (Array.isArray(data.clients) ? data.clients : []);
      linkGenMatches = results;

      if (results.length === 0) {
        resultsArea.innerHTML = `<div class="loading-spinner-row">No clients found matching "${escapeHTML(q)}".</div>`;
        return;
      }
      if (results.length === 1) {
        selectClient(results[0].clientId);
        return;
      }
      resultsArea.innerHTML = renderMatchesList(results);
      wireMatchRows();
    } catch (err) {
      resultsArea.innerHTML = `<div class="loading-spinner-row">We couldn't search for clients. Please try again.</div>`;
    }
  };

  searchBtn.addEventListener("click", search);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });

  copyBtn.addEventListener("click", async () => {
    if (!outputInput.value) return;
    try {
      await navigator.clipboard.writeText(outputInput.value);
      flashFeedback(feedback, "Link copied to clipboard.", "var(--green)");
    } catch (err) {
      outputInput.select();
      flashFeedback(feedback, "Press Ctrl/Cmd+C to copy.", "var(--ink-3)");
    }
  });

  // Restore whatever state existed before the advisor navigated away.
  if (linkGenLink) {
    outputInput.value = linkGenLink;
    outputRow.style.display = "flex";
    emailShareBtn.href = linkGenEmailHref;
    whatsappShareBtn.href = linkGenWhatsappHref;
    shareBtnRow.style.display = "flex";
    if (linkGenNoPhone) {
      feedback.textContent = "No phone number on file — WhatsApp will open without a pre-selected contact.";
      feedback.style.color = "var(--ink-3)";
    }
  } else if (linkGenMatches && linkGenMatches.length > 1) {
    resultsArea.innerHTML = renderMatchesList(linkGenMatches);
    wireMatchRows();
  } else if (linkGenMatches && linkGenMatches.length === 0 && linkGenQuery) {
    resultsArea.innerHTML = `<div class="loading-spinner-row">No clients found matching "${escapeHTML(linkGenQuery)}".</div>`;
  }
}

                ${PLAN_ORDER.map(t => `<th>${escapeHTML(PLAN_DISPLAY_NAMES[t])}${currentPlan === t ? '<span class="compare-current">Current</span>' : ""}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${PLAN_FEATURES.map(f => `
                <tr>
                  <td>${escapeHTML(f.label)}</td>
                  ${PLAN_ORDER.map(t => {
                    const included = PLAN_ORDER.indexOf(t) >= PLAN_ORDER.indexOf(f.tier);
                    return `<td class="compare-cell">${included ? checkSvg : dashSvg}</td>`;
                  }).join("")}

            </tbody>
          </table>
        </div>
        <div class="modal-footer" style="justify-content:flex-start; flex-wrap:wrap; margin-top:14px;">
          <a class="btn-primary" style="text-decoration:none;" href="${requestUpgradeMailto(lastUpgradeModalContext.tier || "professional")}">Contact Sales</a>

    </div>
  `;
  document.getElementById("compareEditionsOverlay").addEventListener("click", (e) => {
    if (e.target.id === "compareEditionsOverlay") closeUpgradeModal();
  });
  document.getElementById("closeCompareEditionsBtn").addEventListener("click", closeUpgradeModal);
  document.getElementById("backToUpgradeModalBtn").addEventListener("click", () => {
    openUpgradeModal(lastUpgradeModalContext.tier, lastUpgradeModalContext.reasonKey);
  });
}


// Bump this by hand with each release you ship.
const SOFTWARE_VERSION = "v1.0.0";

// TODO: build this webhook — reads a "Licenses" sheet you control (one
// row, since each firm gets its own deployment under Model A). Expected
// response shape:
// { "edition": "basic", "status": "Active", "licenseId": "LIC-2026-001",
//   "purchaseDate": "2026-07-15", "supportExpiryDate": "2026-10-15" }
// "status" is a free-text column on your Sheet — expected values are
// Active / Expired / Suspended / Trial, but LICENSE_STATUS_BADGE below
// falls back gracefully if you add others later.
const LICENSE_STATUS_API = "https://nkpflow.app.n8n.cloud/webhook/license-status";

const LICENSE_STATUS_BADGE = {
  active: "verified",   // green
  trial: "received",    // blue
  expired: "pending",   // amber — software still works, just needs renewal
  suspended: "rejected", // red — a deliberate action, not just time passing
};

function licenseStatusPanelHTML() {
  return `
    <div class="panel" style="padding:20px; margin-bottom:14px;" id="licenseStatusPanel">
      <div class="loading-spinner-row" style="padding:0;">Loading license status…</div>
    </div>
  `;
}

async function loadLicenseStatus() {
  const panel = document.getElementById("licenseStatusPanel");
  if (!panel) return;

  try {
    const res = await authFetch(LICENSE_STATUS_API);
    const data = await res.json();
    if (!data || !data.edition) throw new Error("Unexpected response shape");

    const dateFmt = (raw) => {
      if (!raw) return "—";
      const d = new Date(raw);
      return isNaN(d) ? escapeHTML(raw) : d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
    };

    const statusRaw = data.status || "Unknown";
    const badgeClass = LICENSE_STATUS_BADGE[statusRaw.toLowerCase()] || "neutral";

    panel.innerHTML = `
      <div class="license-status-grid">
        <div><div class="lbl">Product</div><div class="name">FinanceDocs</div></div>
        <div><div class="lbl">Current edition</div><div class="name">${escapeHTML(PLAN_DISPLAY_NAMES[data.edition] || data.edition)}</div></div>
        <div><div class="lbl">License status</div><div class="name"><span class="badge ${badgeClass}"><span class="badge-dot"></span>${escapeHTML(statusRaw)}</span></div></div>
        <div><div class="lbl">License type</div><div class="name">Perpetual license</div></div>
        <div><div class="lbl">License ID</div><div class="name">${escapeHTML(data.licenseId || "—")}</div></div>
        <div><div class="lbl">Purchase date</div><div class="name">${dateFmt(data.purchaseDate)}</div></div>
        <div><div class="lbl">Software version</div><div class="name">${escapeHTML(SOFTWARE_VERSION)}</div></div>
        <div><div class="lbl">Support expiry</div><div class="name">${dateFmt(data.supportExpiryDate)}</div></div>
      </div>
    `;
  } catch (err) {
    panel.innerHTML = `<div class="loading-spinner-row" style="padding:0;">Couldn't load license status. The software keeps working either way — this only affects the status shown here.</div>`;
  }
}

    applyPlanUI();
    renderNav();

    } finally {

}

const API_URL = "http://localhost:3000/api/dashboard";
function loadDashboard() {
  // Fired together, not one-after-another — no card has to wait for
  // another to finish loading first.
  loadDashboardTotals();
  loadInProgressCount();
  loadApprovedCount();
}

async function loadDashboardTotals() {
  try {
    const response = await authFetch(API_URL);
    const result = await response.json();
    const dashboard = result.dashboard;

    const setValue = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    };

    setValue("totalClients", dashboard.totalClients);
    setValue("completedClients", dashboard.completedClients);
    setValue("waitingClients", dashboard.waitingClients);
    setValue("pendingDocuments", dashboard.pendingDocuments);
    setValue("receivedDocuments", dashboard.receivedDocuments);
  } catch (err) {
    console.error("Dashboard API Error:", err);
  }
}

// In Progress has no aggregate field on webhook/dashboard, so it's
// derived from the same per-client list the stat breakdowns use.
// Runs independently so a slow/failed clients-list call can't hold
// up the other 5 stats, and vice versa.
async function loadInProgressCount() {
  try {
    const clients = await fetchClientsList();
    const inProgressCount = clients.filter(
      c => Number(c.receivedCount || 0) > 0 && Number(c.pendingCount || 0) > 0
    ).length;
    const el = document.getElementById("inProgressClients");
    if (el) el.textContent = inProgressCount;
  } catch (err) {
    console.error("In Progress count error:", err);
  }
}

// Requires clients-list to return an "approvedCount" field per client
// (a document-level count, matching Pending/Received documents — not
// a client count). Add it alongside pendingCount/receivedCount once
// document approval is wired up on the backend.
async function loadApprovedCount() {
  try {
    const clients = await fetchClientsList();
    const approvedTotal = clients.reduce((sum, c) => sum + Number(c.approvedCount || 0), 0);
    const el = document.getElementById("approvedDocuments");
    if (el) el.textContent = approvedTotal;
  } catch (err) {
    console.error("Approved count error:", err);
  }
}

function applyPlanUI() {
  const plan = getCurrentPlan();
  const titleEl = document.getElementById("planTitle");
  const subEl = document.getElementById("planSub");
  if (titleEl) titleEl.textContent = (PLAN_DISPLAY_NAMES[plan] || plan) + " edition";
  if (subEl) subEl.textContent = PLAN_LABELS[plan] || "";

  const nameEl = document.getElementById("advisorName");
  const avatarEl = document.getElementById("advisorAvatar");
  if (nameEl) nameEl.textContent = appSettings.advisorName || "Advisor";
  if (avatarEl) avatarEl.textContent = appSettings.advisorName ? initials(appSettings.advisorName) : "AD";

  updateNotificationsBellBadge();
}

/* Global client search — available from the topbar on every page.
   Routes through performClientSearch(), which hits CLIENTS_SEARCH_API
   (see its definition above the Clients module) and lets the advisor
   pick the right client when a name matches more than one person. */
function searchClientAndNavigate(query) {
  const q = (query || "").trim();
  if (!q) return;
  active = "clients";
  renderNav();
  document.getElementById("topbarTitle").textContent = PAGE_META[active].title;
  performClientSearch(q);
}

function initGlobalSearch() {
  const input = document.getElementById("globalSearchInput");
  if (!input) return;
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") searchClientAndNavigate(input.value);
  });
}

function bootstrapApp() {
  applyPlanUI();
  renderNav();
  renderContent();
  document.getElementById("topbarTitle").textContent = PAGE_META[active].title;
  fetchAppSettings(); // refreshes appSettings from the server; local cache is used until this resolves
}

initLoginScreen();
initGlobalSearch();
initProfileMenu();
initNotificationsBell();

if (isLoggedIn()) {
  showApp();
  bootstrapApp();
} else {
  showLoginScreen();
}
